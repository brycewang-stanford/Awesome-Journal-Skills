name: Sync submodules

on:
  schedule:
    # Daily at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Init first-level submodules (non-recursive)
        # Keep this workflow aligned with repo-audit.yml: only the five
        # top-level imports are maintained by this index. Some upstream imports
        # carry nested submodule gitlinks without matching .gitmodules entries.
        run: |
          git submodule update --init --depth=1 \
            AER-skills \
            nature-skills \
            nature-paper-skills \
            claude-scholar \
            codex-claude-academic-skills

      - name: Update submodules to latest remote
        # Use checkout mode (the default), NOT --merge. These are third-party
        # index imports: their pinned gitlink and the upstream branch HEAD often
        # have unrelated histories (upstream force-pushes / re-imports), which
        # makes `--merge` abort with "refusing to merge unrelated histories"
        # (exit 128). An index only needs to re-pin each gitlink to upstream's
        # current branch tip, so a plain checkout is both correct and robust.
        run: |
          git submodule update --remote --checkout --force \
            AER-skills \
            nature-skills \
            nature-paper-skills \
            claude-scholar \
            codex-claude-academic-skills
          git submodule status

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No submodule updates."
            exit 0
          fi
          git add AER-skills nature-skills nature-paper-skills claude-scholar codex-claude-academic-skills
          git commit -m "chore: bump submodules to latest upstream"
          git push
